<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Stampede · Tuesday, July 7</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FAF7F2; --ink:#1A1A1A; --sub:#6B6B6B; --line:#E5DFD5;
  --card:#FFFFFF;
  --now:#B3402A;
  --r:10px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--bg); color:var(--ink);
  font-family:"Space Grotesk", system-ui, -apple-system, "PingFang TC", sans-serif;
  min-height:100dvh; padding-bottom:64px;
}
button{font:inherit;border:none;background:none;cursor:pointer;color:inherit}
input{font:inherit}

/* ---------- header ---------- */
header{
  position:sticky; top:0; z-index:20;
  background:rgba(250,247,242,.92); backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);
  padding:14px 20px 0;
}
.hd-top{display:flex;justify-content:space-between;align-items:baseline;gap:12px}
.hd-title{font-size:15px;font-weight:600;letter-spacing:.04em}
.hd-title span{color:var(--now)}
.hd-clock{font-size:13px;color:var(--sub);font-variant-numeric:tabular-nums;white-space:nowrap}
.hd-sub{font-size:11px;color:var(--sub);letter-spacing:.08em;text-transform:uppercase;margin-top:2px}

.searchbar{margin:12px 0 10px;position:relative}
.searchbar input{
  width:100%;padding:10px 14px;border:1px solid var(--line);border-radius:999px;
  background:var(--card);font-size:14px;color:var(--ink);outline:none;
  transition:border-color .2s ease;
}
.searchbar input:focus{border-color:var(--ink)}
.searchbar input::placeholder{color:#B0AAA0}
.searchbar .clr{
  position:absolute;right:8px;top:50%;transform:translateY(-50%);
  width:26px;height:26px;border-radius:50%;background:var(--line);
  font-size:13px;line-height:26px;display:none;
}
.searchbar.has-q .clr{display:block}

.chips{
  display:flex;gap:8px;overflow-x:auto;padding:0 0 12px;
  scrollbar-width:none;-webkit-overflow-scrolling:touch;
}
.chips::-webkit-scrollbar{display:none}
.chip{
  flex:0 0 auto;padding:7px 13px;border-radius:999px;font-size:12.5px;
  border:1px solid var(--line);background:var(--card);color:var(--sub);
  white-space:nowrap;transition:all .2s ease;display:flex;align-items:center;gap:6px;
}
.chip .dot{width:7px;height:7px;border-radius:50%;background:var(--c,#999)}
.chip.on{background:var(--ink);color:#FAF7F2;border-color:var(--ink)}
.chip.on .dot{background:var(--c,#999)}

/* ---------- sections ---------- */
main{padding:0 20px;max-width:720px;margin:0 auto}
.sec-label{
  font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--sub);
  margin:26px 0 10px;display:flex;align-items:center;gap:10px;
}
.sec-label::after{content:"";flex:1;height:1px;background:var(--line)}
.sec-label.now-label{color:var(--now)}
.sec-label.now-label::before{
  content:"";width:8px;height:8px;border-radius:50%;background:var(--now);
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* ---------- event card ---------- */
.ev{
  background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  padding:13px 15px;margin-bottom:9px;
  display:grid;grid-template-columns:58px 1fr;gap:14px;align-items:start;
  border-left:3px solid var(--c,#CCC);
  transition:transform .2s ease, box-shadow .2s ease;
}
@media(hover:hover){
  .ev:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(26,26,26,.06)}
}
.ev-time{
  font-size:15px;font-weight:600;font-variant-numeric:tabular-nums;line-height:1.25;
}
.ev-time small{display:block;font-size:10px;font-weight:400;color:var(--sub);letter-spacing:.06em}
.ev-name{font-size:14.5px;font-weight:500;line-height:1.4}
.ev-venue{font-size:11.5px;color:var(--sub);margin-top:3px;letter-spacing:.03em;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.ev-venue .dot{width:6px;height:6px;border-radius:50%;background:var(--c,#999);flex:0 0 auto}
.badge{
  display:inline-block;font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;
  padding:2px 7px;border-radius:999px;font-weight:600;
}
.badge.tk{background:#8C2F1B;color:#FAF7F2}
.badge.live{background:var(--now);color:#FAF7F2}
.badge.soon{background:#EFE8DC;color:#8A6B3A}
.badge.done{background:var(--line);color:var(--sub)}
.ev.is-done{opacity:.45}
.ev.is-live{border-color:var(--now);border-left-color:var(--now)}

/* hour group */
.hour-group{margin-bottom:4px}
.hour-tag{
  font-size:12px;font-weight:600;color:var(--sub);font-variant-numeric:tabular-nums;
  margin:16px 0 8px;letter-spacing:.06em;
}

/* all-day */
details.allday{margin-top:8px}
details.allday summary{
  list-style:none;font-size:12.5px;color:var(--sub);padding:11px 15px;
  border:1px dashed var(--line);border-radius:var(--r);
  display:flex;justify-content:space-between;align-items:center;
}
details.allday summary::-webkit-details-marker{display:none}
details.allday summary .tw{transition:transform .2s ease;font-size:11px}
details.allday[open] summary .tw{transform:rotate(90deg)}
details.allday .ev{grid-template-columns:1fr}
.ad-hours{font-size:11px;color:var(--sub);font-variant-numeric:tabular-nums}

/* empty */
.empty{
  text-align:center;padding:56px 20px;color:var(--sub);font-size:13.5px;line-height:1.8;
}
.empty b{display:block;font-size:15px;color:var(--ink);font-weight:500;margin-bottom:4px}

footer{
  max-width:720px;margin:36px auto 0;padding:16px 20px 0;border-top:1px solid var(--line);
  font-size:10.5px;color:var(--sub);line-height:1.8;letter-spacing:.03em;
}

/* ---------- next-up banner ---------- */
.nextup{max-width:720px;margin:14px auto 0;padding:0 20px;display:none}
.nextup.show{display:block}
.nu-card{
  background:var(--ink);color:#FAF7F2;border-radius:var(--r);
  padding:13px 16px;display:flex;justify-content:space-between;align-items:center;gap:12px;
}
.nu-l{min-width:0}
.nu-tag{font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;opacity:.55}
.nu-name{font-size:14.5px;font-weight:600;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nu-meta{font-size:11.5px;opacity:.7;margin-top:2px}
.nu-r{text-align:right;flex:0 0 auto;font-variant-numeric:tabular-nums}
.nu-count{font-size:19px;font-weight:600;line-height:1.1}
.nu-count small{font-size:10px;font-weight:400;opacity:.6;display:block;letter-spacing:.08em}

/* ---------- star ---------- */
.ev{grid-template-columns:58px 1fr 30px}
.star{
  width:30px;height:30px;border-radius:50%;font-size:16px;line-height:1;
  color:#C9C2B6;transition:color .2s ease, transform .2s ease;align-self:center;
}
.star:active{transform:scale(.85)}
.star.on{color:#B3402A}
details.allday .ev{grid-template-columns:1fr 30px}
.chip.fav-chip.on{background:var(--now);border-color:var(--now)}

/* ---------- map ---------- */
.mapsec{margin:16px 0 0;padding:0}
.map-head{display:flex;justify-content:space-between;align-items:center;margin:0 auto 8px;padding:0 20px;max-width:720px}
.map-title{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--sub)}
.locate{
  font-size:11.5px;letter-spacing:.06em;padding:6px 14px;border-radius:999px;
  border:1px solid var(--ink);color:var(--ink);transition:all .2s ease;
}
.locate.on{background:var(--ink);color:#FAF7F2}
.locate:disabled{opacity:.4}
.mapbox{background:transparent}
.mapbox svg{display:block;width:100%;height:auto}
.zone{cursor:pointer;transition:opacity .2s ease}
.zone rect{rx:3}
.zone text{
  font-family:"Space Grotesk",system-ui,sans-serif;font-size:7.5px;letter-spacing:.04em;
  fill:#1A1A1A;pointer-events:none;
}
.zone.dim{opacity:.22}
#gpspin{transition:transform .8s ease}
.pin-ring{animation:ring 2.4s ease-out infinite;transform-origin:center}
@keyframes ring{0%{opacity:.5;transform:scale(.4)}100%{opacity:0;transform:scale(1.8)}}
.map-note{font-size:10.5px;color:var(--sub);margin:6px auto 0;padding:0 20px;max-width:720px;line-height:1.6}
.nearby{margin:12px auto 0;padding:0 20px;max-width:720px;display:none}
.nearby.show{display:block}
.nb{
  display:flex;justify-content:space-between;align-items:baseline;gap:12px;
  padding:10px 2px;border-bottom:1px solid var(--line);font-size:13px;
}
.nb:last-child{border-bottom:none}
.nb-l{display:flex;align-items:center;gap:8px;min-width:0}
.nb-l .dot{width:7px;height:7px;border-radius:50%;flex:0 0 auto}
.nb-v{font-weight:500;white-space:nowrap}
.nb-e{color:var(--sub);font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nb-d{font-size:11.5px;color:var(--sub);font-variant-numeric:tabular-nums;white-space:nowrap}
.nb-d .live-t{color:var(--now);font-weight:600}

@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}
}
</style>
</head>

async function pullFavs(){
  try{
    const r=await fetch(`/api/favs?device=${encodeURIComponent(deviceId)}`);
    if(!r.ok)return;
    const d=await r.json();
    if(Array.isArray(d.favs)&&d.favs.length){

      d.favs.forEach(id=>favs.add(id));
      store.set([...favs]);
      if(favs.size!==before){renderChips();render()}

const LIVE_WINDOW=45;   // 開始後 45 分鐘內視為進行中
const SOON_WINDOW=60;   // 60 分鐘內開始視為即將開始

/* ================= HELPERS ================= */
function nowMin(){
  const d=new Date();
  let mm=d.getHours()*60+d.getMinutes();
  if(d.getHours()<4) mm+=1440; // 凌晨視為前一天深夜
  return mm;
}
function fmt(t){
  const h24=Math.floor(t/60)%24, mi=t%60;
  const ap=(t>=720&&t<1440)?"PM":(t>=1440?"AM":"AM");
  let h=h24%12; if(h===0)h=12;
  return {h:`${h}:${String(mi).padStart(2,"0")}`, ap:(t>=1440?"翌日 AM":ap)};
}
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;")}

/* ================= RENDER ================= */
function evCard(e,status){
  const V=VENUES[e.v];
  const f=e.ad?null:fmt(e.t);
  let badge="";
  if(e.tk) badge+=`<span class="badge tk">Ticketed</span>`;
  if(status==="live") badge+=`<span class="badge live">進行中</span>`;
  else if(status==="soon") badge+=`<span class="badge soon">即將開始</span>`;
  const cls=`ev${status==="done"?" is-done":""}${status==="live"?" is-live":""}`;
  const timeCol=e.ad
    ? `<div class="ev-time" style="font-size:12px;font-weight:500">ALL<br>DAY</div>`
    : `<div class="ev-time">${f.h}<small>${f.ap}</small></div>`;
  const on=favs.has(e.id);
  return `<div class="${cls}" style="--c:${V.c}">
    ${timeCol}
    <div>
      <div class="ev-name">${esc(e.n)}</div>
      <div class="ev-venue"><span class="dot"></span>${esc(V.name)}${e.ad?` <span class="ad-hours">· ${e.ad}</span>`:""} ${badge}</div>
    </div>
    <button class="star${on?" on":""}" data-fav="${e.id}" aria-label="${on?"移出想去":"加入想去"}">${on?"♥":"♡"}</button>
  </div>`;
}

function statusOf(e,now){
  if(e.ad) return "ad";
  if(now>=e.t && now<e.t+LIVE_WINDOW) return "live";
  if(e.t>now && e.t<=now+SOON_WINDOW) return "soon";
  if(e.t+LIVE_WINDOW<=now) return "done";
  return "later";
}

function render(){
  const now=nowMin();
  const tokens=query.trim().toLowerCase().split(/\s+/).filter(Boolean);
  const match=e=>{
    if(favOnly&&!favs.has(e.id))return false;
    if(activeVenue!=="all"&&e.v!==activeVenue)return false;
    if(tokens.length){
      const hay=(e.n+" "+VENUES[e.v].name+" "+e.zh).toLowerCase();
      // 每個詞都需命中（AND），中英混搜皆可
      for(const t of tokens) if(!hay.includes(t)) return false;
    }
    return true;
  };
  const timed=EV.filter(e=>!e.ad&&match(e)).sort((a,b)=>a.t-b.t);
  const alldays=EV.filter(e=>e.ad&&match(e));

  const live=timed.filter(e=>statusOf(e,now)==="live");
  const soon=timed.filter(e=>statusOf(e,now)==="soon");
  const rest=timed.filter(e=>{const s=statusOf(e,now);return s!=="live"&&s!=="soon"});

  let html="";
  if(live.length){
    html+=`<div class="sec-label now-label">現在進行中</div>`;
    html+=live.map(e=>evCard(e,"live")).join("");
  }
  if(soon.length){
    html+=`<div class="sec-label">60 分鐘內開始</div>`;
    html+=soon.map(e=>evCard(e,"soon")).join("");
  }
  if(rest.length){
    html+=`<div class="sec-label">全日時間表</div>`;
    let lastHour=-1;
    for(const e of rest){
      const h=Math.floor(e.t/60);
      if(h!==lastHour){
        lastHour=h;
        const f=fmt(h*60);
        html+=`<div class="hour-tag">${f.h.split(":")[0]} ${f.ap}</div>`;
      }
      html+=evCard(e,statusOf(e,now));
    }
  }
  if(alldays.length){
    html+=`<details class="allday"${(q||activeVenue!=="all")?" open":""}>
      <summary>全天開放（${alldays.length}）<span class="tw">▸</span></summary>
      <div style="margin-top:9px">${alldays.map(e=>evCard(e,"ad")).join("")}</div>
    </details>`;
  }
  if(!html){
    html=favOnly
      ?`<div class="empty"><b>還沒有想去的活動</b>點卡片右側的 ♡ 加入，這裡會依時間排好。</div>`
      :`<div class="empty"><b>沒有符合的活動</b>換個關鍵字，或把場地篩選切回「全部」。</div>`;
  }
  const mainEl=document.getElementById("main");
  mainEl.innerHTML=html;
  mainEl.querySelectorAll("[data-fav]").forEach(b=>b.addEventListener("click",ev=>{
    ev.stopPropagation(); toggleFav(+b.dataset.fav);
  }));
  renderNextUp();
}

/* ================= NEXT UP ================= */
function renderNextUp(){
  const box=document.getElementById("nextup");
  const now=nowMin();
  const upcoming=EV.filter(e=>favs.has(e.id)&&!e.ad&&e.t+LIVE_WINDOW>now).sort((a,b)=>a.t-b.t);
  if(!upcoming.length){box.classList.remove("show");box.innerHTML="";return}
  const e=upcoming[0], V=VENUES[e.v], f=fmt(e.t);
  const diff=e.t-now;
  let count, unit;
  if(diff<=0){count="LIVE";unit="進行中"}
  else if(diff<60){count=diff;unit="分鐘後"}
  else{count=`${Math.floor(diff/60)}:${String(diff%60).padStart(2,"0")}`;unit="小時後"}
  let walk="";
  if(userPos){
    const d=distM(userPos.lat,userPos.lng,V.lat,V.lng);
    walk=` · 距離 ${d<950?Math.round(d/10)*10+" m":(d/1000).toFixed(1)+" km"}，步行約 ${Math.max(1,Math.round(d/80))} 分`;
  }
  box.innerHTML=`<div class="nu-card">
    <div class="nu-l">
      <div class="nu-tag">下一站${upcoming.length>1?` · 之後還有 ${upcoming.length-1} 個`:""}</div>
      <div class="nu-name">${esc(e.n)}</div>
      <div class="nu-meta">${f.h} ${f.ap} · ${esc(V.name)}${walk}</div>
    </div>
    <div class="nu-r"><div class="nu-count">${count}<small>${unit}</small></div></div>
  </div>`;
  box.classList.add("show");
}

const FIT=(()=>{ 
  const vs=Object.values(VENUES);
  const fit=(xs,ys)=>{const n=xs.length,mx=xs.reduce((a,b)=>a+b)/n,my=ys.reduce((a,b)=>a+b)/n;
    let num=0,den=0;for(let i=0;i<n;i++){num+=(xs[i]-mx)*(ys[i]-my);den+=(xs[i]-mx)**2}
    const b=num/den;return[my-b*mx,b]};
  const[ax,bx]=fit(vs.map(v=>v.lng),vs.map(v=>v.mx));
  const[ay,by]=fit(vs.map(v=>v.lat),vs.map(v=>v.my));
  return{ax,bx,ay,by};
})();
function proj(lat,lng){return[FIT.ax+FIT.bx*lng, FIT.ay+FIT.by*lat]}

/* ================= GPS ================= */
let watchId=null, userPos=null;
const R=6371000, rad=d=>d*Math.PI/180;
function distM(a,b,c,d){
  const dLat=rad(c-a), dLng=rad(d-b);
  const s=Math.sin(dLat/2)**2+Math.cos(rad(a))*Math.cos(rad(c))*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.sqrt(s));
}
function onPos(p){
  userPos={lat:p.coords.latitude,lng:p.coords.longitude};
  const pin=document.getElementById("gpspin");
  const note=document.getElementById("mapNote");
  const inPark=userPos.lat>MAP.latMin&&userPos.lat<MAP.latMax&&userPos.lng>MAP.lngMin&&userPos.lng<MAP.lngMax;
  if(inPark){
    const[x,y]=proj(userPos.lat,userPos.lng);
    pin.style.display="";
    pin.setAttribute("transform",`translate(${x.toFixed(1)},${y.toFixed(1)})`);
    note.textContent="附近活動依你的位置即時排序（場域座標為近似值，誤差約數十公尺）。";
  }else{
    pin.style.display="none";
    note.textContent="你目前在園區範圍外——已依直線距離列出最近的場域。";
  }
  renderNearby(); renderNextUp();
}
function onPosErr(err){
  document.getElementById("mapNote").textContent="無法取得定位（"+(err.code===1?"權限被拒":"訊號不佳")+"）。可直接點色塊瀏覽各場域。";
  stopWatch();
}
function startWatch(){
  if(!("geolocation" in navigator)){onPosErr({code:0});return}
  const btn=document.getElementById("locBtn");
  btn.classList.add("on"); btn.textContent="定位中";
  watchId=navigator.geolocation.watchPosition(onPos,onPosErr,{enableHighAccuracy:true,maximumAge:15000,timeout:12000});
}
function stopWatch(){
  if(watchId!==null){navigator.geolocation.clearWatch(watchId);watchId=null}
  userPos=null;
  const btn=document.getElementById("locBtn");
  btn.classList.remove("on"); btn.textContent="定位";
  document.getElementById("gpspin").style.display="none";
  document.getElementById("nearby").classList.remove("show");
}
document.getElementById("locBtn").addEventListener("click",()=>{
  watchId===null?startWatch():stopWatch();
});

function venueStatusLine(k,now){
  const evs=EV.filter(e=>e.v===k&&!e.ad).sort((a,b)=>a.t-b.t);
  const live=evs.find(e=>now>=e.t&&now<e.t+LIVE_WINDOW);
  if(live) return {txt:live.n,tag:"live"};
  const next=evs.find(e=>e.t>now);
  if(next){const f=fmt(next.t);return {txt:`${f.h} ${f.ap} · ${next.n}`,tag:"next"}}
  const ad=EV.find(e=>e.v===k&&e.ad);
  if(ad) return {txt:`全天 · ${ad.n}`,tag:"ad"};
  return {txt:"今日場次已結束",tag:"done"};
}
function renderNearby(){
  if(!userPos)return;
  const now=nowMin();
  const box=document.getElementById("nearby");
  const list=Object.entries(VENUES)
    .map(([k,V])=>({k,V,d:distM(userPos.lat,userPos.lng,V.lat,V.lng)}))
    .sort((a,b)=>a.d-b.d).slice(0,4);
  box.innerHTML=list.map(({k,V,d})=>{
    const s=venueStatusLine(k,now);
    const dTxt=d<950?`${Math.round(d/10)*10} m`:`${(d/1000).toFixed(1)} km`;
    return `<div class="nb">
      <div class="nb-l"><span class="dot" style="background:${V.c}"></span>
        <span class="nb-v">${esc(V.name)}</span>
        <span class="nb-e">${s.tag==="live"?"▸ ":""}${esc(s.txt)}</span></div>
      <div class="nb-d">${s.tag==="live"?`<span class="live-t">LIVE</span> · `:""}${dTxt}</div>
    </div>`;
  }).join("");
  box.classList.add("show");
}

/* ================= CLOCK ================= */
function tickClock(){
  const d=new Date();
  document.getElementById("clock").textContent=
    d.toLocaleTimeString("en-CA",{hour:"numeric",minute:"2-digit",hour12:true});
}

/* ================= INIT ================= */
const qEl=document.getElementById("q"), sb=document.getElementById("sb");
qEl.addEventListener("input",()=>{query=qEl.value;sb.classList.toggle("has-q",!!query);render()});
document.getElementById("clr").addEventListener("click",()=>{qEl.value="";query="";sb.classList.remove("has-q");render();qEl.focus()});
renderChips(); render(); renderMap(); tickClock();
setInterval(()=>{tickClock();render();renderNearby();renderNextUp()},30000); // 每 30 秒重算狀態
</script>
